<html>
	<head>
		<title> Registraion Form </title>
	</head>
	<body>
			<h1 align="center"> 👨🏾‍🎓<u> Student Registraion Form </u></h1>
		<marquee direction="left" scrollamount="15">
			Registraion closes on 30th june! Don't miss your chance to enroll.
		</marquee>
			<h1> 📗 Welcome to online form </h1>
			<p> please fill the form below to Registor as a student. </p>
			<h2> 📃Registraion Form </h2>
		<form>
			<label> Full Name :- </label>
				<input type="fname" name="name"/>
			<br/>
			<br/>
			 <label> Email id :- </label>
				<input type="email" name="email"/>
			<br/>
			<br/>
			<label> Password :- </label>
				<input type="number" name="password"/>
			<br/>
			<br/>
			<label> Contact number :- </label>
				<input type="number" name="cnumber"/>
			<br/>
			<br/>
			<label> Date :- </label>
				<input type="date"/>
			<br/>
			<br/>
			<label> Time :- </label>
				<input type="time"/>
			<br/>
			<br/>
			<label> Gender :- </label>
				<label> <input type="radio" name="gender" value=""/> Male </label>
				<label><input type="radio" name="gender" value=""/> Female </label>
				<label><input type="radio" name="gender" value="other"/> other </label>
			<br/>
			<br/>
			<label> select course:- </label>
				<li><input type="checkbox" name="select course" value="Mathematics "/>
			<label> Mathematics </label></li>
				<li><input type="checkbox" name="select course" value="science"/>
			<label> science </label></li>
				<li><input type="checkbox" name="select course" value="Computer  science"/>
			<label> Computer  science </label></li>
			<br/>
			<label> Choose Department </label>
			<select name="Choose Department">
			<option>Arts</option>
			<option>Commerce</option>
			<option>Science</option>
			<br/>
			<br/>
		</form>
	</body>
</html>
